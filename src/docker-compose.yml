services:
  broker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - 5555:5555
      - 5556:5556

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: proxy
    volumes:
      - ./proxy.py:/app/main.py
    ports:
      - 5557:5557
      - 5558:5558

  referencia:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: referencia
    volumes:
      - ./referencia.py:/app/main.py
    ports:
      - 5559:5559

  servidor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    volumes:
      - ./servidor.py:/app/main.py
    depends_on:
      - broker
      - proxy
      - referencia
    deploy:
      replicas: 3

  cliente:
    build:
      context: .
      dockerfile: Dockerfile.cliente
    depends_on:
      - servidor
    deploy:
      replicas: 1
